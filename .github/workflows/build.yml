name: Build OpenWrt APK

on:
  push:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release luci-theme-win98 OpenWrt APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare dist output dir
        run: mkdir -p dist

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          # 移除 cache: "pip" 解决报错

      - name: Install gh cli
        run: sudo apt update && sudo apt install -y gh

      - name: Build & upload OpenWrt APK for each commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t shas < <(python - <<'PY'
          import json
          import os
          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)
          for commit in event.get("commits", []):
              sha = commit.get("id")
              if sha:
                  print(sha)
          PY
          )

          if [ "${#shas[@]}" -eq 0 ]; then
            shas=("${GITHUB_SHA}")
          fi

          for sha in "${shas[@]}"; do
            short_sha="${sha:0:12}"
            tag="apk-${short_sha}"
            out_file="dist/luci-theme-win98-${short_sha}.apk"

            # 彻底清理工作区，防止不同提交文件污染
            git reset --hard HEAD
            git clean -fdx
            git checkout --force "$sha"

            # 调用 OpenWrt apk 打包脚本
            python scripts/build_apk.py --out "$out_file"

            # 上传/创建 Release
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag exists, overwrite APK asset"
              gh release upload "$tag" "$out_file" --clobber
            else
              echo "Create new release tag $tag"
              gh release create "$tag" "$out_file" \
                --target "$sha" \
                --title "luci-theme-win98 OpenWrt APK ${short_sha}" \
                --notes "Automated OpenWrt 25.12 APK build for commit: \`${sha}\`" \
                --latest=false
            fi
          done
